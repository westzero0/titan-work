<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>업무 스케줄 - 월간</title>
    <style>
        :root { --bg: #f4f7f6; --white: #ffffff; --red: #ff4d4f; --blue: #007bff; --green: #e2fbe5; --text: #333; --border: #eee; --today-bg: #fff9db; --select-bg: rgba(0, 123, 255, 0.2); }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; user-select: none; -webkit-user-select: none; }
        
        header { width: 100%; max-width: 600px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .nav-month { display: flex; align-items: center; gap: 12px; font-weight: bold; font-size: 1rem; }
        .nav-btn { cursor: pointer; padding: 4px 10px; background: white; border: 1px solid var(--border); border-radius: 5px; font-size: 0.8rem; }
        
        .role-badge { font-size: 0.65rem; padding: 3px 8px; border-radius: 12px; font-weight: bold; }
        .role-me { background: var(--green); color: #155724; border: 1px solid #a3cfbb; }
        .role-oppa { background: #cfe2ff; color: #084298; border: 1px solid #b6d4fe; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); width: 100%; max-width: 600px; background: var(--white); border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); position: relative; }
        .day-label { text-align: center; font-size: 0.65rem; color: #888; font-weight: 600; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .day-label:nth-child(7n+1) { color: var(--red); }
        
        .cell { position: relative; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); min-height: 95px; padding: 2px; display: flex; flex-direction: column; transition: background 0.1s; cursor: pointer; }
        .cell:nth-child(7n) { border-right: none; }
        
        .cell.selecting { background-color: var(--select-bg) !important; }
        .cell.today { background-color: var(--today-bg) !important; border: 2px solid var(--blue) !important; z-index: 5; }
        .cell.today .date-num { color: var(--blue); font-size: 0.9rem; font-weight: 800; }

        .date-num { font-size: 0.8rem; font-weight: 600; margin-bottom: 2px; padding: 2px; z-index: 3; pointer-events: none; }
        .is-holiday .date-num { color: var(--red); }
        .holiday-label { font-size: 0.55rem; font-weight: normal; margin-left: 4px; opacity: 0.8; }
        .other-month { opacity: 0.2; pointer-events: none; }

        .btn-group { display: flex; flex-direction: column; gap: 2px; margin-top: auto; z-index: 4; }
        button.status { border: 1px solid var(--border); border-radius: 4px; padding: 5px 0; font-size: 0.6rem; cursor: pointer; background: rgba(255,255,255,0.8); line-height: 1; }
        button.status-1 { background: var(--green) !important; color: #155724; border-color: #a3cfbb; font-weight: bold; }
        button.status-2 { background: var(--blue) !important; color: white; border-color: #0056b3; font-weight: bold; }

        .cell.has-event { border-top: 1px solid rgba(0,0,0,0.05); }
        .event-bar { position: absolute; left: 0; right: 0; height: 14px; color: white; font-size: 0.55rem; padding: 0 4px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; border-radius: 2px; z-index: 10; cursor: pointer; pointer-events: auto; line-height: 14px; transition: transform 0.1s; }
        .event-bar:active { transform: scale(0.98); }
        .event-title { font-size: 0.55rem; color: #444; padding: 2px 4px; z-index: 3; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; pointer-events: none; }

        /* 모달(팝업창) 스타일 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 2000; opacity: 0; visibility: hidden; transition: 0.2s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 80%; max-width: 320px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); transform: translateY(20px); transition: 0.2s; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-title { font-size: 1rem; font-weight: bold; margin: 0 0 15px 0; color: var(--text); }
        .modal-input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .modal-input:focus { border-color: var(--blue); }
        .modal-btns { display: flex; gap: 8px; justify-content: space-between; }
        .modal-btn { flex: 1; padding: 12px 0; border: none; border-radius: 6px; font-size: 0.9rem; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        .modal-btn:active { opacity: 0.8; }
        .btn-edit { background: var(--blue); color: white; }
        .btn-delete { background: var(--red); color: white; }

        .loading-bar { position: fixed; top: 0; left: 0; width: 0%; height: 3px; background: var(--blue); transition: width 0.3s; z-index: 3000; }
    </style>
</head>
<body>
    <div id="loading-bar" class="loading-bar"></div>
    <header>
        <div class="nav-month">
            <div class="nav-btn" onclick="changeMonth(-1)">◀</div>
            <span id="current-month">로딩중...</span>
            <div class="nav-btn" onclick="changeMonth(1)">▶</div>
        </div>
        <div id="badge" class="role-badge">로딩중</div>
    </header>
    
    <div class="calendar-grid" id="calendar">
        <div class="day-label">일</div><div class="day-label">월</div><div class="day-label">화</div>
        <div class="day-label">수</div><div class="day-label">목</div><div class="day-label">금</div><div class="day-label">토</div>
    </div>

    <div id="event-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title">일정 관리</h3>
            <input type="text" id="modal-input" class="modal-input" placeholder="일정 명칭을 입력하세요">
            <div class="modal-btns">
                <button id="modal-btn-edit" class="modal-btn btn-edit">수정</button>
                <button id="modal-btn-delete" class="modal-btn btn-delete">삭제</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyGauZPGjsXbbmFdh5NPUJUgPOCi5E8Y7VRpNkiT_hPTMoz64Ukyej3v2ksF4YUtqRNwA/exec'; 
        const urlParams = new URLSearchParams(window.location.search);
        const user = urlParams.get('user') || 'me';
        let currentYear, currentMonth; 
        let isDragging = false, startId = null, endId = null;
        let currentEditingEvent = null; 

        const holidayData = { "2026-01-01": "신정", "2026-02-16": "설날 연휴", "2026-02-17": "설날", "2026-02-18": "설날 연휴", "2026-03-01": "삼일절", "2026-03-02": "대체공휴일", "2026-05-05": "어린이날", "2026-05-24": "부처님오신날", "2026-05-25": "대체공휴일", "2026-06-03": "지방선거", "2026-06-06": "현충일", "2026-08-15": "광복절", "2026-08-17": "대체공휴일", "2026-09-24": "추석 연휴", "2026-09-25": "추석", "2026-09-26": "추석 연휴", "2026-10-03": "개천절", "2026-10-05": "대체공휴일", "2026-10-09": "한글날", "2026-12-25": "성탄절" };

        async function init() {
            const badge = document.getElementById('badge');
            badge.innerText = user === 'me' ? "🙋‍♀️ 내 설정" : "🙋‍♂️ 오빠 확인";
            badge.className = `role-badge ${user === 'me' ? 'role-me' : 'role-oppa'}`;
            const now = new Date();
            currentYear = now.getFullYear(); currentMonth = now.getMonth();
            await fetchData();
            if(user === 'me') setupDragEvents();
            setupModalEvents();
        }

        async function fetchData() {
            document.getElementById('loading-bar').style.width = '30%';
            try {
                const res = await fetch(API_URL + "?t=" + new Date().getTime());
                const allData = await res.json();
                localStorage.setItem('full_data_cache', JSON.stringify(allData));
                render(allData);
            } catch (e) {
                const cached = localStorage.getItem('full_data_cache');
                if (cached) render(JSON.parse(cached));
            } finally {
                document.getElementById('loading-bar').style.width = '0%';
            }
        }

        function render(allData) {
            document.getElementById('current-month').innerText = `${currentYear}.${(currentMonth + 1).toString().padStart(2, '0')}`;
            const container = document.getElementById('calendar');
            container.querySelectorAll('.cell').forEach(el => el.remove());
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
            const prevLastDate = new Date(currentYear, currentMonth, 0).getDate();
            for (let i = firstDay - 1; i >= 0; i--) createCell(prevLastDate - i, true);
            for (let i = 1; i <= lastDate; i++) createCell(i, false, allData);
            const remaining = 42 - container.querySelectorAll('.cell').length;
            for (let i = 1; i <= remaining; i++) createCell(i, true);
        }

        function createCell(date, isOther, allData) {
            const cell = document.createElement('div');
            const dateStr = `${currentYear}-${(currentMonth + 1).toString().padStart(2, '0')}-${date.toString().padStart(2, '0')}`;
            const holidayName = holidayData[dateStr];
            const now = new Date();
            const isToday = !isOther && date === now.getDate() && currentMonth === now.getMonth() && currentYear === now.getFullYear();

            cell.className = `cell ${isOther ? 'other-month' : ''} ${isToday ? 'today' : ''}`;
            if (!isOther) cell.dataset.id = dateStr; 
            
            if (holidayName) cell.classList.add('is-holiday');
            cell.innerHTML = `<div class="date-num">${date}${holidayName ? ` <span class="holiday-label">${holidayName}</span>` : ''}</div>`;
            
            if (!isOther && allData) {
                const eventOnThisDay = allData.events.find(ev => {
                    const s = new Date(ev.start); s.setHours(0,0,0,0);
                    const e = new Date(ev.end); e.setHours(0,0,0,0);
                    const curr = new Date(dateStr); curr.setHours(0,0,0,0);
                    return curr >= s && curr <= e;
                });

                if (eventOnThisDay) {
                    cell.classList.add('has-event');
                    cell.style.backgroundColor = eventOnThisDay.color + '33'; 
                    
                    const bar = document.createElement('div');
                    bar.className = 'event-bar';
                    bar.style.background = eventOnThisDay.color;
                    bar.style.top = "20px";
                    bar.innerText = eventOnThisDay.title;
                    
                    bar.onclick = (e) => {
                        e.stopPropagation();
                        if (user !== 'me') return; 
                        openModal(eventOnThisDay);
                    };
                    
                    if (new Date(dateStr).toDateString() === new Date(eventOnThisDay.start).toDateString() || new Date(dateStr).getDay() === 0 || date === 1) {
                        cell.appendChild(bar);
                    } else {
                        bar.innerText = ''; 
                        cell.appendChild(bar);
                    }
                } else {
                    const btnGroup = document.createElement('div');
                    btnGroup.className = 'btn-group';
                    ['AM', 'PM'].forEach(time => {
                        const id = `${dateStr}-${time}`;
                        const item = allData.daily.find(d => d.id === id) || { status: 0 };
                        const btn = document.createElement('button');
                        btn.className = `status status-${item.status}`;
                        btn.innerText = (time === 'AM' ? '☀️' : '🌙') + (item.status === 2 ? ' 확정' : (item.status === 1 ? ' 가능' : ''));
                        btn.onclick = (e) => { e.stopPropagation(); handleToggle(id, item.status, time, allData); };
                        btnGroup.appendChild(btn);
                    });
                    cell.appendChild(btnGroup);
                }
            }
            document.getElementById('calendar').appendChild(cell);
        }

        function openModal(ev) {
            currentEditingEvent = ev;
            document.getElementById('modal-input').value = ev.title;
            document.getElementById('event-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('event-modal').classList.remove('active');
            currentEditingEvent = null;
        }

        function setupModalEvents() {
            // 1. 수정 버튼
            document.getElementById('modal-btn-edit').onclick = () => {
                const newTitle = document.getElementById('modal-input').value.trim();
                if (newTitle && newTitle !== currentEditingEvent.title) {
                    manageEvent('edit_event', currentEditingEvent, newTitle);
                }
            };

            // 2. 삭제 버튼
            document.getElementById('modal-btn-delete').onclick = () => {
                if(confirm('이 일정을 삭제하시겠습니까?')) {
                    manageEvent('delete_event', currentEditingEvent, null);
                }
            };

            // 3. 모달 바깥 영역(배경) 클릭 시 닫기
            document.getElementById('event-modal').addEventListener('click', (e) => {
                if (e.target.id === 'event-modal') {
                    closeModal();
                }
            });
        }

        async function manageEvent(actionType, ev, newTitle) {
            closeModal();
            document.getElementById('loading-bar').style.width = '100%';
            try {
                await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ type: actionType, oldTitle: ev.title, newTitle: newTitle }),
                    mode: 'no-cors'
                });
                location.reload();
            } finally {
                document.getElementById('loading-bar').style.width = '0%';
            }
        }

        function setupDragEvents() {
            const container = document.getElementById('calendar');
            const getCellId = (e) => {
                const x = e.clientX || (e.touches && e.touches[0].clientX);
                const y = e.clientY || (e.touches && e.touches[0].clientY);
                return document.elementFromPoint(x, y)?.closest('.cell:not(.other-month)')?.dataset.id;
            };
            const startAction = (e) => {
                if(e.target.classList.contains('event-bar')) return; 
                const id = getCellId(e); if (!id) return;
                isDragging = true; startId = endId = id; updateHighlight();
            };
            const moveAction = (e) => {
                if (!isDragging) return;
                const id = getCellId(e); if (id && id !== endId) { endId = id; updateHighlight(); }
            };
            const endAction = async () => {
                if (!isDragging) return; isDragging = false;
                const title = prompt("장기 일정 명칭을 입력하세요 (예: 네팔 원정):");
                if (title) {
                    document.getElementById('loading-bar').style.width = '100%';
                    const startDate = startId < endId ? startId : endId;
                    const endDate = startId < endId ? endId : startId;
                    await fetch(API_URL, { 
                        method: 'POST', 
                        body: JSON.stringify({ type: 'event', start: startDate, end: endDate, title: title, color: '#FF5733' }),
                        mode: 'no-cors'
                    });
                    location.reload();
                }
                startId = endId = null; updateHighlight();
            };
            container.addEventListener('mousedown', startAction);
            window.addEventListener('mousemove', moveAction);
            window.addEventListener('mouseup', endAction);
            container.addEventListener('touchstart', (e) => { if(e.touches.length === 1) startAction(e); }, {passive: false});
            window.addEventListener('touchmove', (e) => { if(isDragging) moveAction(e); }, {passive: false});
            window.addEventListener('touchend', endAction);
        }

        function updateHighlight() {
            document.querySelectorAll('.cell').forEach(cell => {
                const id = cell.dataset.id; if (!id) return;
                const isBetween = (id >= startId && id <= endId) || (id <= startId && id >= endId);
                cell.classList.toggle('selecting', isDragging && isBetween);
            });
        }

        async function handleToggle(id, currentStatus, time, allData) {
            let nextStatus = currentStatus;
            if (user === 'me') nextStatus = currentStatus === 0 ? 1 : (currentStatus === 1 ? 0 : currentStatus);
            else if (user === 'oppa' && currentStatus !== 0) nextStatus = currentStatus === 1 ? 2 : 1;
            
            if (nextStatus !== currentStatus) {
                document.getElementById('loading-bar').style.width = '100%';
                try {
                    await fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: 'status', id, status: nextStatus }), mode: 'no-cors' });
                    const idx = allData.daily.findIndex(d => d.id === id);
                    if (idx > -1) allData.daily[idx].status = nextStatus;
                    else allData.daily.push({ id, status: nextStatus });
                    localStorage.setItem('full_data_cache', JSON.stringify(allData));
                    render(allData);
                } finally {
                    setTimeout(() => { document.getElementById('loading-bar').style.width = '0%'; }, 400);
                }
            }
        }

        function changeMonth(dir) {
            currentMonth += dir;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            else if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            fetchData();
        }
        init();
    </script>
</body>
</html>
