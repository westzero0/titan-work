<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="theme-color" content="#E60012" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#E60012" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="192.png">

    <title>타이탄 일보 v3.5</title>
    
    <style>
      :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --chip-bg: #f1f5f9; }

body {
    font-family: -apple-system, sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    margin: 0; padding: 0;
    padding-bottom: 100px; /* 내비바 공간 */
}

.container { max-width: 500px; margin: auto; padding: 15px; }

/* 1. 공통 카드 스타일 */
.card { 
    background: white; 
    border-radius: 16px; 
    padding: 16px; 
    margin-bottom: 16px; 
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
    border: 1px solid #f1f5f9; 
    box-sizing: border-box;
}

label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; color: #475569; }
input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #cbd5e1; font-size: 1rem; box-sizing: border-box; margin-bottom: 10px; }

/* 2. 칩(Chip) 관리 UI */
.chip-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 10px; }
.chip-input-group { display: flex; flex: 1; gap: 5px; }
.chip-input-group input { margin-bottom: 0; flex: 1; padding: 8px; font-size: 0.9rem; }
.add-btn { background: #334155; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; white-space: nowrap; cursor: pointer; }
.del-mode-btn { color: #ef4444; font-size: 0.8rem; cursor: pointer; white-space: nowrap; font-weight: bold; }
.chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; min-height: 20px; }
.chip { padding: 8px 14px; background: var(--chip-bg); border-radius: 20px; font-size: 0.9rem; cursor: pointer; border: 1px solid #e2e8f0; transition: 0.2s; }
.chip.active { background: var(--primary); color: white; border-color: var(--primary); }
.chip.delete-target { background: #fee2e2; color: #ef4444; border: 1px dashed #ef4444; }

/* 3. 하단 네비 및 스플래시 */
.bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background: white; display: flex; border-top: 1px solid #e2e8f0; z-index: 1000; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.8rem; color: #64748b; cursor: pointer; }
.nav-item.active { color: var(--primary); font-weight: bold; }

#splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #E60012; display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease-out; }
.loader { width: 30px; height: 30px; border: 3px solid #333; border-top: 3px solid #ef4444; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* 4. 타임라인 그리드 (14일 일정) */
.timeline-grid {
    display: flex; overflow-x: auto; overflow-y: hidden;
    max-height: 200px; gap: 12px; padding: 15px 10px;
    background: white; border-radius: 16px; margin-bottom: 20px;
    scrollbar-width: none; align-items: flex-start;
}
.timeline-grid::-webkit-scrollbar { display: none; }

.time-col {
    min-width: 95px; max-height: 170px; overflow-y: auto;
    background: #f8fafc; border: 1px solid #e2e8f0;
    border-radius: 12px; padding: 10px 4px; scrollbar-width: none;
}
.time-col::-webkit-scrollbar { display: none; }

.job-bar {
    width: 95%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin: 3px auto; font-size: 0.8rem; padding: 6px 4px;
    border-radius: 6px; text-align: center; box-sizing: border-box;
    color: #ffffff !important; font-weight: bold;
}

/* 5. 카드뷰 전용 스타일 */
.schedule-card-item { transition: all 0.4s ease; }
.past-btn { width: 100%; padding: 10px; background: #f1f5f9; border: 1px dashed #cbd5e1; border-radius: 10px; margin-bottom: 15px; color: #64748b; font-size: 0.9rem; }
.worker-chip { display: inline-block; padding: 2px 8px; background: #e2e8f0; border-radius: 12px; font-size: 0.75rem; margin-right: 4px; color: #475569; font-weight: 600; }
.sun { color: #ef4444 !important; }
.sat { color: #2563eb !important; }

/* 6. 자재 UI 시스템 */
#sub-category-chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 5px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
.sub-chip { padding: 6px 14px; border: 1px solid #cbd5e1; border-radius: 20px; background: white; color: #64748b; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
.sub-chip.active { background: #2563eb; color: white; border-color: #2563eb; }

.mat-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.mat-table th, .mat-table td { border: 1px solid #cbd5e1; padding: 6px 4px; font-size: 0.85rem; vertical-align: middle; text-align: center; }
.mat-table td:nth-child(1), .mat-table td:nth-child(2) { text-align: left; padding-left: 8px; }
.qty-control-box { display: flex; width: 100%; height: 36px; }
.qty-input-box { width: 100%; text-align: center; font-weight: bold; font-size: 1.1rem; color: #2563eb; border: 1px solid #e2e8f0; }
.qty-btn-col { display: flex; flex-direction: column; width: 30px; }
.qty-btn-up, .qty-btn-down { flex: 1; border: 1px solid #e2e8f0; font-size: 0.6rem; cursor: pointer; }

/* 7. 모달(팝업) 시스템 */
.modal {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.5); z-index: 10000; align-items: center; justify-content: center;
}
.modal-content { background: white; width: 90%; max-width: 380px; border-radius: 20px; padding: 20px; max-height: 85vh; overflow-y: auto; position: relative; }

/* 동기화 토스트 */
#sync-toast {
    display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(30, 41, 59, 0.9); color: white; padding: 8px 16px; border-radius: 20px;
    font-size: 0.85rem; font-weight: bold; z-index: 10001; align-items: center; gap: 8px;
}
.sync-spinner { width: 14px; height: 14px; border: 2px solid #cbd5e1; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }


/* 🚀 8. 전송(저장) 버튼 스타일 (누락 복구) */
.submit-btn { 
    width: 100%; padding: 16px; background: #2563eb; color: white; 
    border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; 
    cursor: pointer; box-shadow: 0 4px 6px rgba(37,99,235,0.2); 
    transition: all 0.2s; margin-bottom: 20px;
}
.submit-btn:disabled { background: #94a3b8; cursor: not-allowed; box-shadow: none; }

/* 📦 9. 자재 직접 입력 팝업 전용 스타일 (누락 복구) */
.modal-overlay { 
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(0,0,0,0.5); z-index: 10000; align-items: center; justify-content: center; 
}
.modal-box { 
    background: white; width: 90%; max-width: 350px; border-radius: 16px; 
    padding: 20px; box-sizing: border-box; 
}
.modal-title { font-size: 1.1rem; font-weight: bold; color: #1e293b; margin-bottom: 5px; }
.modal-subtitle { font-size: 0.85rem; color: #64748b; margin-bottom: 15px; }
.modal-input { 
    width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; 
    margin-bottom: 10px; font-size: 1rem; box-sizing: border-box; outline: none;
}
.modal-btn-group { display: flex; gap: 10px; margin-top: 10px; }
.modal-btn-cancel { 
    flex: 1; padding: 12px; background: #f1f5f9; color: #475569; 
    border: none; border-radius: 8px; font-weight: bold; cursor: pointer; 
}
.modal-btn-confirm { 
    flex: 1; padding: 12px; background: #2563eb; color: white; 
    border: none; border-radius: 8px; font-weight: bold; cursor: pointer; 
}

/* 👤 로그인 버튼/인풋 스타일 (누락 복구) */
.btn { width: 100%; background: #2563eb; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
.input-field { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #cbd5e1; box-sizing: border-box; }        
        
        
    </style>
</head>
